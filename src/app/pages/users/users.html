<nz-card nzTitle="Users">

  <nz-table
    #userTable
    [nzData]="users"
    [nzBordered]="true"
    [nzPageSize]="5"
  >

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let u of userTable.data">
        <td>#{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>

        <td>
          <nz-tag [nzColor]="getRoleColor(u.role)">
            {{ u.role }}
          </nz-tag>
        </td>
      </tr>
    </tbody>

  </nz-table>

</nz-card>
